      <script>
        // Drag & Drop für beide Panels, aber Steuerpanel nur am Handle
        function makeDraggable(panelId, handleId) {
          const panel = document.getElementById(panelId);
          const handle = handleId ? document.getElementById(handleId) : panel;
          let offsetX = 0, offsetY = 0, isDown = false;
          handle.addEventListener('mousedown', function(e) {
            isDown = true;
            offsetX = e.clientX - panel.offsetLeft;
            offsetY = e.clientY - panel.offsetTop;
            panel.style.zIndex = 100;
            e.preventDefault();
            e.stopPropagation();
          });
          document.addEventListener('mousemove', function(e) {
            if (!isDown) return;
            panel.style.left = (e.clientX - offsetX) + 'px';
            panel.style.top = (e.clientY - offsetY) + 'px';
          });
          document.addEventListener('mouseup', function() {
            isDown = false;
            panel.style.zIndex = 10;
          });
        }
        window.addEventListener('DOMContentLoaded', function() {
          makeDraggable('controlPanel', 'panelHandle');
          makeDraggable('valuePanel');
        });
      </script>
