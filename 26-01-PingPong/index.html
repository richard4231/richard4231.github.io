      <style>
        body {
          background: #f3f6fa;

            <style>
              .draggable-panel.minimized {
                width: 44px !important;
                min-width: 44px !important;
                height: 44px !important;
                padding: 12px !important;
                flex: 0 0 44px !important;
                overflow: hidden !important;
              }
              .draggable-panel.minimized .panel-content {
                display: none !important;
              }
              .draggable-panel.minimized h3 {
                display: none !important;
              }
              .draggable-panel.minimized div:not(.minimize-btn) {
                display: none !important;
              }
              .minimize-btn:hover {
                background: #1a5ab8 !important;
              }
            </style>
      <script>
        // Drag & Drop für beide Panels
        function makeDraggable(panelId, handleId) {
          const panel = document.getElementById(panelId);
          const handle = handleId ? document.getElementById(handleId) : panel;
          let offsetX = 0, offsetY = 0, isDown = false;
          handle.addEventListener('mousedown', function(e) {
            // Nicht verschieben, wenn direkt auf den Minimize-Button geklickt wird
            if (e.target.classList.contains('minimize-btn')) return;
            isDown = true;
            // Verwende getBoundingClientRect für korrekte Position
            const rect = panel.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            panel.style.zIndex = 100;
            e.preventDefault();
            e.stopPropagation();
          });
          document.addEventListener('mousemove', function(e) {
            if (!isDown) return;
            const parent = panel.offsetParent || document.body;
            const parentRect = parent.getBoundingClientRect();
            panel.style.left = (e.clientX - parentRect.left - offsetX) + 'px';
            panel.style.top = (e.clientY - parentRect.top - offsetY) + 'px';
          });
          document.addEventListener('mouseup', function() {
            isDown = false;
            panel.style.zIndex = 10;
          });
        }
        window.addEventListener('DOMContentLoaded', function() {
          // Beide Panels auf der gleichen Höhe von oben
          const controlPanel = document.getElementById('controlPanel');
          const valuePanel = document.getElementById('valuePanel');

          // Kontrollpanel rechts positionieren
          controlPanel.style.right = '32px';
          controlPanel.style.top = '100px';
          controlPanel.style.left = '';

          valuePanel.style.left = '32px';
          valuePanel.style.top = '100px';
          valuePanel.style.right = '';

          // Minimize-Funktionalität für beide Panels
          document.querySelectorAll('.minimize-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
              e.stopPropagation();
              const panelId = this.getAttribute('data-panel');
              const panel = document.getElementById(panelId);
              panel.classList.toggle('minimized');
              // Symbol ändern
              if (panel.classList.contains('minimized')) {
                this.textContent = '+';
                this.title = 'Maximieren';
              } else {
                this.textContent = '−';
                this.title = 'Minimieren';
              }
            });
          });
          // Kontrollpanel nur verschiebbar, wenn auf freie Fläche geklickt wird (nicht auf Slider, Checkbox, Button)
          function makePanelDraggable(panelId) {
            const panel = document.getElementById(panelId);
            let offsetX = 0, offsetY = 0, isDown = false;
            // Prüfe ob Panel mit 'right' positioniert ist
            const useRight = panel.style.right && !panel.style.left;

            panel.addEventListener('mousedown', function(e) {
              // Wenn Panel minimiert ist, ist es überall verschiebbar
              if (panel.classList.contains('minimized')) {
                // Nur nicht verschieben, wenn direkt auf den Minimize-Button geklickt wird
                if (e.target.classList.contains('minimize-btn')) return;
              } else {
                // Panel nur verschieben, wenn der Klick mindestens 16px von einem interaktiven Element entfernt ist
                const interactiveTags = ["input","button","label"];
                let tooClose = false;
                interactiveTags.forEach(tag => {
                  document.querySelectorAll(`#${panelId} ${tag}`).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const distX = Math.max(rect.left - e.clientX, e.clientX - rect.right, 0);
                    const distY = Math.max(rect.top - e.clientY, e.clientY - rect.bottom, 0);
                    const dist = Math.sqrt(distX*distX + distY*distY);
                    if (dist < 16) tooClose = true;
                  });
                });
                if (tooClose) return;
              }
              isDown = true;
              const rect = panel.getBoundingClientRect();
              const parent = panel.offsetParent || document.body;
              const parentRect = parent.getBoundingClientRect();

              if (useRight) {
                // Abstand von Maus zur rechten Kante des Panels
                offsetX = rect.right - e.clientX;
              } else {
                // Abstand von Maus zur linken Kante des Panels
                offsetX = e.clientX - rect.left;
              }
              offsetY = e.clientY - rect.top;
              panel.style.zIndex = 100;
              e.preventDefault();
              e.stopPropagation();
            });
            document.addEventListener('mousemove', function(e) {
              if (!isDown) return;
              const parent = panel.offsetParent || document.body;
              const parentRect = parent.getBoundingClientRect();

              if (useRight) {
                // Neue rechte Position: parent.right - (Mausposition + Offset)
                panel.style.right = (parentRect.right - (e.clientX + offsetX)) + 'px';
              } else {
                panel.style.left = (e.clientX - parentRect.left - offsetX) + 'px';
              }
              panel.style.top = (e.clientY - parentRect.top - offsetY) + 'px';
            });
            document.addEventListener('mouseup', function() {
              isDown = false;
              panel.style.zIndex = 10;
            });
          }
          makePanelDraggable('controlPanel');
          makeDraggable('valuePanel');
        });
      </script>
