<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahrscheinlichkeits-Drehrad</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #container {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        #info {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        #canvas-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        canvas {
            border-radius: 4px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            font-size: 16px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 2px solid #ddd;
        }
        .legend-ja {
            background: rgb(16, 185, 129);
        }
        .legend-nein {
            background: rgb(239, 68, 68);
        }
        #result {
            text-align: center;
            margin-top: 20px;
            font-size: 48px;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ja {
            color: #10b981;
        }
        .nein {
            color: #ef4444;
        }
        #situation-info {
            text-align: center;
            color: #666;
            margin-top: 15px;
            font-size: 16px;
        }
        #controls {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
            font-weight: 500;
        }
        button:hover {
            background: linear-gradient(135deg, #357ABD 0%, #2868A8 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
        }
        .instruction {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>🎯 Wahrscheinlichkeits-Drehrad</h1>
        <div id="info">→ oder Weiter für nächsten Schritt · ← zurück zur vorherigen Situation</div>
        <div id="canvas-container">
            <canvas id="wheel" width="400" height="400"></canvas>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color legend-ja"></div>
                <span><strong>JA</strong></span>
            </div>
            <div class="legend-item">
                <div class="legend-color legend-nein"></div>
                <span><strong>NEIN</strong></span>
            </div>
        </div>
        <div id="result"></div>
        <div id="situation-info"></div>
        <div id="controls">
            <button onclick="app.spin('slow')">⏱️ Lange drehen</button>
            <button onclick="app.spin('fast')">⚡ Kurz drehen</button>
            <button onclick="app.next()">Weiter</button>
        </div>
        <div class="instruction">Ablauf: Drehen verdeckt → Scheibe offen → Drehen offen → Nächste Situation</div>
    </div>

    <script>
        const app = {
            // Canvas
            canvas: null,
            ctx: null,
            
            // Situationen
            sits: [
                { jaPercent: 9.0, keyword: "Seltenes Ereignis" },
                { jaPercent: 25.5, keyword: "Regentag" },
                { jaPercent: 50.0, keyword: "Münzwurf" },
                { jaPercent: 75.0, keyword: "Sonniger Tag" },
                { jaPercent: 91.3, keyword: "Sehr wahrscheinlich" },
                { jaPercent: 15.7, keyword: "Gewinnchance" },
                { jaPercent: 66.7, keyword: "Zwei von drei" },
                { jaPercent: 33.3, keyword: "Würfel: 1 oder 2" },
                { jaPercent: 5.2, keyword: "Unwahrscheinlich" },
                { jaPercent: 82.4, keyword: "Hohe Chance" }
            ],
            
            // State
            sitIdx: 0,
            open: false,
            state: 'ready', // 'ready', 'spinning', 'done'
            result: null, // true = JA, false = NEIN (wird in spin() gesetzt)
            
            // Animation
            angle: 0,
            targetAngle: 0,
            speed: 0,
            
            init() {
                this.canvas = document.getElementById('wheel');
                this.ctx = this.canvas.getContext('2d');
                this.angle = Math.random() * Math.PI * 2;
                this.updateInfo();
                this.animate();
            },
            
            animate() {
                // Animation Loop
                if (this.state === 'spinning') {
                    this.angle += this.speed;
                    this.speed *= 0.96;
                    
                    // Stoppe wenn Geschwindigkeit fast null ist
                    // OHNE den Winkel zu ändern - lass es natürlich auslaufen
                    if (this.speed < 0.005) {
                        this.state = 'done';
                        this.showResult();
                        console.log('Animation gestoppt - state jetzt:', this.state);
                    }
                }
                
                this.draw();
                requestAnimationFrame(() => this.animate());
            },
            
            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                // Clear
                ctx.fillStyle = '#fafafa';
                ctx.fillRect(0, 0, w, h);
                
                ctx.save();
                ctx.translate(w/2, h/2);
                
                // Rad
                ctx.save();
                ctx.rotate(this.angle);
                this.drawWheel();
                ctx.restore();
                
                // Zeiger (oben, Spitze nach unten)
                ctx.save();
                ctx.translate(0, -165);
                ctx.fillStyle = 'rgba(120, 120, 120, 0.6)';
                ctx.strokeStyle = 'rgba(80, 80, 80, 0.7)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-8, 0);
                ctx.lineTo(8, 0);
                ctx.lineTo(0, 25);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
                
                ctx.restore();
            },
            
            drawWheel() {
                const ctx = this.ctx;
                const s = this.sits[this.sitIdx];
                const jaRad = (s.jaPercent / 100) * Math.PI * 2;
                
                if (!this.open) {
                    // Verdeckt
                    ctx.fillStyle = '#ccc';
                    ctx.beginPath();
                    ctx.arc(0, 0, 160, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Textur
                    ctx.strokeStyle = '#b4b4b4';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 12; i++) {
                        const a = (i / 12) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(Math.cos(a) * 140, Math.sin(a) * 140);
                        ctx.lineTo(Math.cos(a) * 160, Math.sin(a) * 160);
                        ctx.stroke();
                    }
                } else {
                    // Offen - JA startet bei -90° (oben)
                    const startAngle = -Math.PI / 2;
                    
                    // JA Sektor (grün)
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.7)';
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, 160, startAngle, startAngle + jaRad);
                    ctx.closePath();
                    ctx.fill();
                    
                    // NEIN Sektor (rot)
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.7)';
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, 160, startAngle + jaRad, startAngle + Math.PI * 2);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Rand
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 160, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Text - JA
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 28px Roboto';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    const jaAngle = startAngle + jaRad / 2;
                    const jaX = Math.cos(jaAngle) * 110;
                    const jaY = Math.sin(jaAngle) * 110;
                    ctx.fillText(s.jaPercent.toFixed(1) + '%', jaX, jaY);
                    
                    // Text - NEIN
                    const neinAngle = startAngle + jaRad + (Math.PI * 2 - jaRad) / 2;
                    const neinX = Math.cos(neinAngle) * 110;
                    const neinY = Math.sin(neinAngle) * 110;
                    ctx.fillText((100 - s.jaPercent).toFixed(1) + '%', neinX, neinY);
                }
            },
            
            spin(type) {
                if (this.state !== 'ready') return;
                
                const s = this.sits[this.sitIdx];
                const PI2 = Math.PI * 2;
                
                // 1. WÜRFLE JA/NEIN basierend auf Wahrscheinlichkeit
                const rand = Math.random() * 100;
                this.result = rand < s.jaPercent; // true = JA, false = NEIN
                
                // 2. Berechne Zielwinkel im Rad (-90° bis 270°)
                const jaRad = (s.jaPercent / 100) * PI2;
                const startAngle = -Math.PI / 2;
                
                let targetInWheel;
                if (this.result) {
                    // JA: Zwischen -90° und -90°+jaRad
                    targetInWheel = startAngle + Math.random() * jaRad;
                } else {
                    // NEIN: Zwischen -90°+jaRad und 270°
                    targetInWheel = startAngle + jaRad + Math.random() * (PI2 - jaRad);
                }
                
                // 3. Normalisiere beide Winkel auf 0-2π
                let currentNorm = this.angle % PI2;
                if (currentNorm < 0) currentNorm += PI2;
                
                let targetNorm = targetInWheel % PI2;
                if (targetNorm < 0) targetNorm += PI2;
                
                // 4. Berechne Differenz (immer vorwärts)
                let diff = targetNorm - currentNorm;
                if (diff < 0) diff += PI2;
                
                // 5. Füge 2-4 Umdrehungen hinzu
                const turns = 2 + Math.random() * 2;
                this.targetAngle = this.angle + turns * PI2 + diff;
                
                // 6. Geschwindigkeit
                this.speed = (type === 'fast') ? 0.3 : 0.6;
                
                this.state = 'spinning';
                document.getElementById('result').innerHTML = '';
            },
            
            showResult() {
                // Zeige das in spin() berechnete Ergebnis an
                document.getElementById('result').innerHTML = 
                    this.result ? '<span class="ja">JA</span>' : '<span class="nein">NEIN</span>';
            },
            
            next() {
                console.log('next() aufgerufen - state:', this.state, 'open:', this.open);
                
                if (this.state === 'spinning') {
                    console.log('-> Noch am drehen, ignoriere');
                    return;
                }
                
                if (this.state === 'ready' && !this.open) {
                    // 1. Drehen verdeckt
                    console.log('-> Drehen verdeckt');
                    this.spin('fast');
                } else if (this.state === 'done' && !this.open) {
                    // 2. Zeige offen
                    console.log('-> Zeige offen');
                    this.open = true;
                    this.state = 'ready';
                    this.result = null;
                    document.getElementById('result').innerHTML = '';
                    this.updateInfo();
                } else if (this.state === 'ready' && this.open) {
                    // 3. Drehen offen
                    console.log('-> Drehen offen');
                    this.spin('fast');
                } else if (this.state === 'done' && this.open) {
                    // 4. Nächste Situation
                    console.log('-> Nächste Situation');
                    this.open = false;
                    this.state = 'ready';
                    this.result = null;
                    this.sitIdx = (this.sitIdx + 1) % this.sits.length;
                    this.angle = Math.random() * Math.PI * 2;
                    document.getElementById('result').innerHTML = '';
                    this.updateInfo();
                } else {
                    console.log('-> Keine Bedingung getroffen!');
                }
            },
            
            back() {
                if (this.state === 'spinning') {
                    this.angle = this.targetAngle;
                    this.state = 'done';
                }
                this.open = false;
                this.state = 'ready';
                this.result = null;
                this.sitIdx = (this.sitIdx - 1 + this.sits.length) % this.sits.length;
                this.angle = Math.random() * Math.PI * 2;
                document.getElementById('result').innerHTML = '';
                this.updateInfo();
            },
            
            updateInfo() {
                const s = this.sits[this.sitIdx];
                const txt = this.open ? '🎯 Offen' : '🎭 Verdeckt';
                document.getElementById('situation-info').innerHTML = 
                    `<strong>${txt}</strong> · Situation ${this.sitIdx + 1}/${this.sits.length}: ${s.keyword}`;
            }
        };
        
        // Tastatur
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                app.next();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                app.back();
            }
        });
        
        // Start
        app.init();
    </script>
</body>
</html>
